<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page avec Logo et Bouton</title>
    <link rel="stylesheet" href="accueil-principal.css">

    <style>
        /* Centrage du header */
        header {
            text-align: center;
            padding: 20px 0;
        }

        header img {
            width: 150px; /* Ajuste la taille du logo ici */
            height: auto;
        }

        /* Centrage du bouton au milieu de la page */
        .center-container {
            height: 70vh; /* espace vertical */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            background: #1d00ff;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #8e44ad;
        }
    </style>
</head>

<body>

    <!-- Logo centré -->

 <br><br>
    
    <div style="text-align: center;">
    <img src="logopn.png" alt="Logo du site" width="660" height="200">
</div>



    <!-- Bouton centré au milieu -->
    <div class="center-container">
        <a href="home.html" class="btn btn-primary btn-lg custom-btn">Cliquez ici pour rentrer dans le site</a>
        <a href="quisommesnous.html" class="btn btn-primary btn-lg custom-btn">Présentation : Qui sommes nous ?</a>
        <a href="https://x.com/PhonexyPRC" class="btn btn-primary btn-lg custom-btn">Nous suivre sur Twitter - @Phonexy</a>
    </div>
    
    <!-- Flou sur l'arrière plan -->
    <div class="background-blur"></div>

<div class="content">
</div>

</body>
</html>
